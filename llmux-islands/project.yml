# XcodeGen spec for the llmux-islands macOS app.
# Regenerate the Xcode project with:  cd llmux-islands && xcodegen generate
name: LlmuxIslands
options:
  bundleIdPrefix: ai.2lab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.2.3"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    # NOTE: do NOT use SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor — that is an
    # Xcode 26 setting and CI (macos-latest) runs Xcode 16.4, where it is ignored
    # and the lifted UI fails to compile. Portability comes from explicit
    # `@MainActor` on the AppKit-bridge classes instead.
    # The Release `-O` SIL inliner can crash swift-frontend on the lifted SwiftUI
    # views; a menu-bar app needs no optimization, so disable it.
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
targets:
  LlmuxIslands:
    type: application
    platform: macOS
    sources:
      - path: LlmuxIslands
    settings:
      base:
        PRODUCT_NAME: LlmuxIslands
        PRODUCT_BUNDLE_IDENTIFIER: ai.2lab.LlmuxIslands
        INFOPLIST_FILE: LlmuxIslands/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LlmuxIslands/Resources/LlmuxIslands.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "NO"
