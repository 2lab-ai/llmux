name: Release

# Stable release on tag v*. The tag must match Cargo.toml's version
# (spec: Versioning — Cargo.toml v0.x.y must match release tag).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: llmux-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: llmux-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: llmux-linux-x86_64
          # Native arm64 runner (free for public repos) — no cross/zigbuild needed.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: llmux-linux-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      LLMUX_BUILD_CHANNEL: stable
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "error: tag $GITHUB_REF_NAME doesn't match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Set build id
        shell: bash
        run: echo "LLMUX_BUILD_ID=${GITHUB_REF_NAME}-$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/llmux" "${{ matrix.name }}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
          else
            shasum -a 256 "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

  islands:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve version from tag
        shell: bash
        run: echo "ISLANDS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build the app (ad-hoc signed; no Developer ID in CI)
        working-directory: llmux-islands
        run: |
          set -euo pipefail
          xcodegen generate
          xcodebuild -project LlmuxIslands.xcodeproj -scheme LlmuxIslands \
            -configuration Release -derivedDataPath build \
            MARKETING_VERSION="$ISLANDS_VERSION" \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package .app
        working-directory: llmux-islands
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/LlmuxIslands.app"
          ZIP="LlmuxIslands-${ISLANDS_VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LlmuxIslands
          path: |
            llmux-islands/LlmuxIslands-*.zip
            llmux-islands/LlmuxIslands-*.zip.sha256

  release:
    needs: [build, islands]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for asset in llmux-macos-aarch64 llmux-macos-x86_64 llmux-linux-x86_64 llmux-linux-aarch64; do
            cp "artifacts/$asset/$asset" "release/$asset"
          done
          # the islands app rides the same v* release (built by the `islands` job)
          cp artifacts/LlmuxIslands/LlmuxIslands-*.zip release/
          (cd release && sha256sum llmux-* LlmuxIslands-*.zip > SHA256SUMS)
          cat release/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/llmux-macos-aarch64
            release/llmux-macos-x86_64
            release/llmux-linux-x86_64
            release/llmux-linux-aarch64
            release/LlmuxIslands-*.zip
            release/SHA256SUMS
